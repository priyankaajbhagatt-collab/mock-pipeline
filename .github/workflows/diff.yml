name: CDK Diff

on:
  pull_request:
    paths:
      - 'infra/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  diff:
    name: CDK Diff
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: infra/package-lock.json

      - name: Install dependencies
        working-directory: infra
        run: npm ci

      - name: CDK Diff
        id: diff
        working-directory: infra
        run: |
          set +e
          npx cdk diff --all 2>&1 | tee /tmp/cdk-diff.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
          {
            echo 'diff_output<<DIFF_EOF'
            cat /tmp/cdk-diff.txt
            echo 'DIFF_EOF'
          } >> $GITHUB_OUTPUT

      - name: Post diff comment
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const diffOutput = process.env.DIFF_OUTPUT;
            const exitCode = process.env.EXIT_CODE;
            const status = exitCode === '0' ? '✅ No changes' : '⚠️ Changes detected';

            const body = `### CDK Diff — ${status}

            <details><summary>Full diff output</summary>

            \`\`\`
            ${diffOutput}
            \`\`\`
            </details>`;

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
        env:
          DIFF_OUTPUT: ${{ steps.diff.outputs.diff_output }}
          EXIT_CODE: ${{ steps.diff.outputs.exit_code }}
